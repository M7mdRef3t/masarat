name: Dispatch Update to Alrehla

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'package.json'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Alrehla Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ALREHLA_DISPATCH_TOKEN }}
          repository: M7mdRef3t/dawayir
          event-type: masarat-engine-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
